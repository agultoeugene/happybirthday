<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Birthday</title>
  <style>
    body{font-family: Georgia, serif;background: linear-gradient(135deg,#ff97ba,#ffe9f1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}
    .card{background:rgba(255,255,255,0.95);padding:40px;border-radius:14px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.08);text-align:center}
    h1{margin:0 0 18px;font-size:3.8rem;color:#ff83ab}
    .letter-box{background:#fff;border-radius:8px;padding:24px;margin-top:16px;min-height:160px;position:relative;overflow:hidden;border:1px solid #f3d6e0}
    .letter-text{white-space:pre-wrap;text-align:left;font-size:1.05rem;color:#333;line-height:1.6;min-height:120px}
    .controls{margin-top:18px;display:flex;gap:12px;justify-content:center}
    .btn{padding:10px 18px;border-radius:999px;border:none;background:#ffb3d8;color:white;font-weight:700;cursor:pointer}
    .small{font-size:0.9rem;color:#b65d82;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Birthday ❤️</h1>
    <div class="letter-box">
      <div id="letter" class="letter-text"></div>
    </div>
    <div class="controls">
      <button class="btn" id="replay">Replay</button>
      <button class="btn" id="home">Back</button>
      <button class="btn" id="musicToggle">Toggle Music</button>
    </div>
    <div class="small">A little note, typed just for you.</div>
  </div>

  <script>
    const message = `My dearest love,\n\nOn this special day I celebrate you — your smile, your heart, and every small thing that makes my life brighter.\n\nMay your day be filled with laughter, warmth, and everything you dream of.\n\nI love you always.\n\n— With all my heart`;
    const el = document.getElementById('letter');
    let idx = 0;
    let typing;
    function typeText() {
      el.textContent = '';
      idx = 0;
      clearInterval(typing);
      typing = setInterval(() => {
        el.textContent = message.slice(0, idx);
        idx++;
        if (idx > message.length) clearInterval(typing);
      }, 30);
    }
    document.getElementById('replay').addEventListener('click', typeText);
    document.getElementById('home').addEventListener('click', () => {
      try {
        if (window.opener) {
          try { window.opener.focus(); } catch(e){}
          window.close();
          return;
        }
      } catch(e){}
      window.location.href = 'gallery.html';
    });
    // audio resume logic
    const bg = document.createElement('audio');
    bg.id = 'bgAudio';
    bg.src = 'audio/song.mp3';
    bg.preload = 'auto';
    document.body.appendChild(bg);

    function tryResume() {
      try {
        const playing = sessionStorage.getItem('bgPlaying');
        const t = parseFloat(sessionStorage.getItem('bgTime') || '0') || 0;
        if (playing === '1') {
          bg.currentTime = t;
          bg.play().catch(() => {
            // autoplay blocked — show a small prompt by enabling Toggle Music
          });
        }
      } catch(e){}
    }

    document.getElementById('musicToggle').addEventListener('click', () => {
      if (bg.paused) {
        bg.play();
        try { sessionStorage.setItem('bgPlaying','1'); } catch(e){}
      } else {
        bg.pause();
        try { sessionStorage.setItem('bgPlaying','0'); } catch(e){}
      }
    });

    // Start typing and attempt to resume audio on load
    window.addEventListener('load', () => { setTimeout(typeText, 400); tryResume(); });
  </script>
</body>
</html>
